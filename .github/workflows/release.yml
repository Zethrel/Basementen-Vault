# Release build: triggered by pushing a version tag (e.g. `v1.0.0`), or by a
# manual `workflow_dispatch` with the tag as input (the fallback when a tag
# can't be pushed directly). Either way a matching tag + draft release is made.
#
# Produces a DRAFT GitHub Release with desktop bundles for macOS / Linux /
# Windows, a SHA256SUMS file, and pushes a multi-arch server image to GHCR.
# The release is left as a draft and `:latest` is deliberately NOT moved — a
# human verifies the artifacts end-to-end (docs/RELEASE_CHECKLIST.md) before
# publishing and retagging `latest`.
#
# Code signing / notarization: set the APPLE_* / signing repository secrets to
# produce SIGNED builds. Without them, bundles build UNSIGNED — fine for testing,
# not for a public release (the checklist gates on signed artifacts).
name: Release

on:
  push:
    tags: ["v*.*.*"]
  # Manual fallback for when a tag can't be pushed directly (e.g. a
  # branch-scoped push proxy). `tauri-action` creates the tag + draft release
  # at the dispatched commit, so the result is identical to a tag push.
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release, e.g. v1.0.0-beta.2 (must match the version in Cargo.toml / tauri.conf.json)"
        required: true
        type: string

permissions:
  contents: write # create the release + upload assets
  packages: write # push the server image to GHCR
  id-token: write # OIDC token for build-provenance attestation
  attestations: write # record SLSA provenance for the released artifacts

env:
  CARGO_TERM_COLOR: always

jobs:
  # Resolve the release tag once so every job agrees on it whether the run
  # came from a tag push (`github.ref_name`) or a manual dispatch (`inputs.tag`).
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          case "$tag" in
            v*.*.*) ;;
            *) echo "::error::tag '$tag' must look like vMAJOR.MINOR.PATCH"; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag"

  desktop:
    name: Desktop bundle (${{ matrix.platform }})
    needs: resolve
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            rust_targets: ""
            args: ""
          - platform: windows-latest
            rust_targets: ""
            args: ""
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux bundling dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libxdo-dev \
            libayatana-appindicator3-dev patchelf

      # Pinned toolchain (matches rust-toolchain.toml) so release binaries are
      # built with the same rustc as CI and third-party reproductions. The cross
      # targets must be installed against *this* toolchain, not a floating
      # `stable`, or the macOS universal build can't find them.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To produce SIGNED + notarized macOS builds, add these repository
          # secrets and UNCOMMENT the lines below. Leaving them defined-but-empty
          # makes tauri-action attempt (and fail) an import, so they must be
          # absent entirely for unsigned builds:
          #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.resolve.outputs.tag }}
          releaseName: "Basementen Vault ${{ needs.resolve.outputs.tag }}"
          releaseBody: |
            Desktop builds for ${{ needs.resolve.outputs.tag }}. See CHANGELOG.md.

            **Unaudited beta** — verify `SHA256SUMS` before installing, and do not
            store irreplaceable secrets until an independent security audit is done.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  server-image:
    name: Server image (multi-arch)
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-server" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ steps.img.outputs.name }}
          # Version tags only. `:latest` is intentionally not moved here — retag
          # it by hand after end-to-end verification (RELEASE_CHECKLIST §7).
          # `value=` feeds the resolved tag explicitly so this works for a
          # manual dispatch too (no git tag ref to read from).
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve.outputs.tag }}

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SLSA build provenance: cryptographically binds this image digest to the
      # source commit + this workflow, so a puller can verify it was built from
      # published source with `gh attestation verify oci://<image>@<digest>`.
      # Gated on repo visibility — the attestation API is unavailable for
      # user-owned private repos (see docs/REPRODUCIBLE_BUILDS.md).
      - name: Attest server image provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  checksums:
    name: Publish SHA256SUMS
    needs: [resolve, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download the draft release's assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" --dir dist --pattern '*'

      # Checksums first, so they are always published even if the optional
      # attestation step below is skipped or fails.
      - name: Generate SHA256SUMS
        run: |
          cd dist
          # Write to the repo root so the sums file can't hash itself.
          sha256sum * > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Upload SHA256SUMS to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          gh release upload "${TAG}" SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" --clobber

      # SLSA build provenance for every desktop bundle, binding each to the
      # source commit + this workflow. Verify with
      # `gh attestation verify <file> --repo <owner>/<repo>`.
      # Gated on repo visibility: the GitHub attestation API is not available
      # for user-owned private repositories (it errors), so this runs only once
      # the repo is public. See docs/REPRODUCIBLE_BUILDS.md.
      - name: Attest desktop artifact provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"
