# cargo-deny configuration — the project's supply-chain gate, run in CI
# (`.github/workflows/ci.yml`, `cargo deny check advisories bans sources licenses`).
#
# cargo-deny's `advisories` check queries the same RustSec advisory database as
# `cargo audit`, so it *is* our advisory scan; it just gives one auditable place
# (this file) to record every accepted/ignored advisory with a justification.
# This file is the single source of truth for accepted advisories: GitHub
# Dependabot alerts for these same transitive crates are dismissed as "risk is
# tolerable" and cross-referenced here (see docs/THREAT_MODEL.md §A7).
#
# The `licenses` check IS gated in CI: every crate's license must be on the
# allow-list below, confirmed against the full dependency tree.

[advisories]
version = 2
# A yanked crate is a warning, not a hard failure (it's a release-hygiene signal,
# not a vulnerability). None currently in the tree.
yanked = "warn"
# Only flag *unmaintained* crates that are our own direct workspace dependencies.
# The unmaintained crates in the tree are all transitive and unavoidable: the
# gtk-rs GTK3 stack (atk/gdk/gtk/... — Tauri's Linux WebKit backend, upstream
# archived pending Tauri's GTK4 migration), the `unic-*` crates, and
# `proc-macro-error`. None are ours; none are actionable here.
unmaintained = "workspace"
# Accepted advisories. Each is transitive and unreachable in our threat model;
# revisit whenever the upstream chain updates.
ignore = [
  # quick-xml 0.39.4 quadratic / unbounded-alloc DoS on *untrusted* XML. Reached
  # only through `wayland-scanner` (a build-time proc-macro that parses the
  # static Wayland protocol XML shipped inside the crate) → wl-clipboard-rs →
  # arboard. That is a compile-time parse of trusted, developer-controlled files,
  # never attacker input. quick-xml 0.41.0 (patched) is also already in the tree
  # for the runtime paths.
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]
# Removed as no longer detected (v1.0.0-beta.5 review): RUSTSEC-2023-0071 (rsa —
# left the lockfile with sqlx 0.9) and RUSTSEC-2024-0429 (glib — advisory no
# longer matches the in-tree version). Re-add with justification if they refire.

[bans]
# Duplicate major versions and wildcard specs are worth surfacing but are almost
# always transitive and not actionable in a Tauri tree, so they warn rather than
# fail the build. Wildcards between our own path crates are exempt.
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true

[sources]
# Only the public crates.io registry — no git or unknown-registry sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[licenses]
# Gated in CI (see header). AGPL-3.0 is our own license; the rest are the
# permissive licenses expected across the RustCrypto / Tauri / axum stacks.
# Every entry is either present in the tree or (AGPL-3.0) our own crates'
# license; cargo-deny warns—but does not fail—on an unused allowance.
version = 2
confidence-threshold = 0.9
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  # Our own crates' SPDX id (the current form; "AGPL-3.0" is the deprecated one).
  "AGPL-3.0-only",
  # Permissive licenses on individual transitive deps:
  # - 0BSD (BSD Zero Clause): quoted_printable, adler2
  # - BSL-1.0 (Boost): clipboard-win, error-code
  # - CDLA-Permissive-2.0: webpki-roots (the Mozilla CA root store, as data)
  "0BSD",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
]
