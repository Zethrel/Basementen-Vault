name: CI

# Run on every push (the working branch is the default branch and receives
# direct commits, so a `main`-only filter would never fire) and on every PR.
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libxdo-dev
      # Version comes from rust-toolchain.toml (single source of truth); pinned
      # here too so the components install against the right toolchain.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  deny:
    # Supply-chain gate. cargo-deny's `advisories` check queries the same RustSec
    # advisory database as `cargo audit`, so this is our advisory scan too — with
    # one auditable place (deny.toml) to record accepted advisories and their
    # justifications. (A separate `rustsec/audit-check` job was dropped as a
    # redundant second copy that couldn't honour those ignores.)
    name: Supply-chain (cargo-deny / RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Advisories + banned/duplicate crates + source registries + licenses.
      # The license allow-list (deny.toml) is confirmed against the full tree.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses
