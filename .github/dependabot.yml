# Automated dependency-update PRs. Complements the CI supply-chain gates
# (cargo-deny / RustSec) — Dependabot proposes the bumps, CI vets them.
version: 2
updates:
  # Rust workspace (root Cargo.lock covers all member crates).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # The RustCrypto crates release as an interdependent generation (shared
      # `digest`/`crypto-common` traits): bumping one alone cannot compile
      # (see PRs #8/#9/#11/#15). Group their MAJOR bumps into a single PR so
      # the migration arrives as one reviewable, coordinated change.
      rustcrypto-generation:
        applies-to: version-updates
        update-types: ["major"]
        patterns:
          - "sha1"
          - "sha2"
          - "hmac"
          - "hkdf"
          - "chacha20poly1305"
          - "argon2"
          - "blake2"
          - "digest"
          - "aead"
          - "cipher"
          - "crypto-common"
          - "password-hash"
          - "subtle"
          - "zeroize"
      # One PR for the low-risk minor/patch bumps; other majors stay separate.
      cargo-minor-and-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions pinned in the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # The server image's runtime base (debian). The `rust` BUILD base is ignored:
  # it must track rust-toolchain.toml (the single source of truth for the
  # compiler version — see docs/REPRODUCIBLE_BUILDS.md) and is bumped manually,
  # in lockstep, when the toolchain pin moves. PR #1 bumped it out of sync.
  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "rust"
